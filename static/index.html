<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BooksRun eBay Fetcher</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: 'Georgia', serif; background: #0f1117; color: #e8e0d0; min-height: 100vh; padding: 28px 24px; }
  h1 { font-size: 22px; letter-spacing: 2px; text-transform: uppercase; color: #c8a96e; margin-bottom: 4px; }
  .subtitle { font-size: 12px; color: #555; letter-spacing: 1px; margin-bottom: 28px; }
  .panel { background: #1a1d26; border: 1px solid #2e3244; border-radius: 10px; padding: 20px 22px; margin-bottom: 20px; }
  .panel-title { font-size: 11px; color: #888; letter-spacing: 1px; text-transform: uppercase; margin-bottom: 14px; }
  .cond-tabs { display: flex; gap: 8px; flex-wrap: wrap; }
  .cond-tab { padding: 8px 22px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; border: 2px solid transparent; transition: all 0.18s; user-select: none; }
  .tab-new { background: #1a2e4e; color: #7eb3e8; }
  .tab-new.active { border-color: #7eb3e8; }
  .tab-vg { background: #3a2e10; color: #c8a96e; }
  .tab-vg.active { border-color: #c8a96e; }
  .tab-both { background: #1e3a1e; color: #7ec87e; }
  .tab-both.active { border-color: #7ec87e; }
  .controls { display: flex; gap: 14px; flex-wrap: wrap; align-items: flex-end; }
  .field { display: flex; flex-direction: column; gap: 5px; }
  .field label { font-size: 11px; color: #888; letter-spacing: 1px; text-transform: uppercase; }
  select { background: #0f1117; border: 1px solid #2e3244; color: #e8e0d0; padding: 8px 12px; border-radius: 6px; font-size: 13px; cursor: pointer; }
  .btn { padding: 9px 22px; border-radius: 6px; font-size: 13px; font-weight: bold; cursor: pointer; border: none; letter-spacing: 1px; transition: all 0.18s; }
  .btn-primary { background: #c8a96e; color: #0f1117; }
  .btn-primary:hover { background: #e0bf80; }
  .btn-primary:disabled { background: #333; color: #666; cursor: not-allowed; }
  .btn-stop { background: transparent; color: #e07070; border: 1px solid #e07070; }
  .btn-stop:hover { background: #e0707018; }
  .btn-xlsx-new { background: #1a2e4e; color: #7eb3e8; }
  .btn-xlsx-new:hover { background: #1e3860; }
  .btn-xlsx-vg { background: #3a2e10; color: #c8a96e; }
  .btn-xlsx-vg:hover { background: #4a3e18; }
  .btn-xlsx-all { background: #1e3a1e; color: #7ec87e; }
  .btn-xlsx-all:hover { background: #285a28; }
  .btn-isbn { background: transparent; color: #aaa; border: 1px solid #2e3244; }
  .btn-isbn:hover { background: #2e324422; }
  .progress-wrap { display: none; }
  .progress-label { font-size: 12px; color: #999; margin-bottom: 6px; }
  .progress-bar-bg { background: #2e3244; border-radius: 4px; height: 6px; overflow: hidden; }
  .progress-bar-fill { background: #c8a96e; height: 100%; border-radius: 4px; transition: width 0.3s; width: 0%; }
  .stats { display: flex; gap: 10px; flex-wrap: wrap; }
  .stat { background: #0f1117; border: 1px solid #2e3244; border-radius: 8px; padding: 10px 16px; min-width: 100px; }
  .stat-val { font-size: 22px; font-weight: bold; color: #c8a96e; }
  .stat-lbl { font-size: 10px; color: #555; margin-top: 2px; letter-spacing: 1px; text-transform: uppercase; }
  .actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .table-wrap { max-height: 500px; overflow-y: auto; border-radius: 8px; border: 1px solid #2e3244; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; padding: 10px 12px; background: #1a1d26; color: #c8a96e; font-size: 10px; letter-spacing: 1px; text-transform: uppercase; border-bottom: 1px solid #2e3244; position: sticky; top: 0; z-index: 5; }
  td { padding: 8px 12px; border-bottom: 1px solid #1a1d26; color: #ccc; vertical-align: middle; }
  tr:hover td { background: #1a1d2666; }
  .isbn { font-family: monospace; color: #c8a96e; font-size: 12px; }
  .price { color: #7ec87e; font-weight: bold; }
  .badge { font-size: 11px; padding: 2px 8px; border-radius: 20px; display: inline-block; }
  .badge-new { background: #1a2e4e; color: #7eb3e8; }
  .badge-vg  { background: #3a2e10; color: #c8a96e; }
  .link-out { color: #c8a96e; text-decoration: none; font-size: 12px; }
  .link-out:hover { text-decoration: underline; }
  .empty { text-align: center; padding: 40px; color: #555; font-size: 14px; }
  .error-box { background: #2a1a1a; border: 1px solid #8b3a3a; border-radius: 8px; padding: 12px 16px; color: #e07070; font-size: 13px; display: none; margin-bottom: 16px; }
</style>
</head>
<body>

<h1>📚 BooksRun eBay Fetcher</h1>
<p class="subtitle">BooksRun eBay mağazasından en son eklenen kitapları çeker</p>

<div class="panel">
  <div class="panel-title">Kondisyon Seçin</div>
  <div class="cond-tabs">
    <div class="cond-tab tab-new" id="tab-new" onclick="selectCond('new')">🔵 Sadece New</div>
    <div class="cond-tab tab-vg active" id="tab-vg" onclick="selectCond('vg')">🟡 Sadece Very Good</div>
    <div class="cond-tab tab-both" id="tab-both" onclick="selectCond('both')">🟢 İkisi Birden</div>
  </div>
</div>

<div class="panel">
  <div class="panel-title">Ayarlar</div>
  <div class="controls">
    <div class="field">
      <label>Kitap Sayısı</label>
      <select id="totalCount">
        <option value="500">500</option>
        <option value="1000">1.000</option>
        <option value="2000">2.000</option>
        <option value="5000" selected>5.000</option>
        <option value="10000">10.000</option>
      </select>
    </div>
    <div class="field">
      <label>Sıralama</label>
      <select id="sortOrder">
        <option value="newlyListed">En Yeni Eklenen</option>
        <option value="price">En Düşük Fiyat</option>
        <option value="-price">En Yüksek Fiyat</option>
      </select>
    </div>
    <button class="btn btn-primary" id="fetchBtn" onclick="startFetch()">🔍 Kitapları Çek</button>
    <button class="btn btn-stop" id="stopBtn" onclick="stopFetch()" style="display:none;">⏹ Durdur</button>
  </div>
</div>

<div class="error-box" id="errorBox"></div>

<div class="panel progress-wrap" id="progressPanel">
  <div class="progress-label" id="progressLabel">Başlatılıyor...</div>
  <div class="progress-bar-bg"><div class="progress-bar-fill" id="progressFill"></div></div>
</div>

<div class="panel" id="statsPanel" style="display:none;">
  <div class="panel-title">Sonuçlar</div>
  <div class="stats">
    <div class="stat"><div class="stat-val" id="sTot">0</div><div class="stat-lbl">Toplam</div></div>
    <div class="stat"><div class="stat-val" id="sISBN">0</div><div class="stat-lbl">ISBN'li</div></div>
    <div class="stat"><div class="stat-val" id="sNew">0</div><div class="stat-lbl">New</div></div>
    <div class="stat"><div class="stat-val" id="sVG">0</div><div class="stat-lbl">Very Good</div></div>
    <div class="stat"><div class="stat-val" id="sAvg">$0</div><div class="stat-lbl">Ort. Fiyat</div></div>
  </div>
</div>

<div class="panel actions" id="actionsPanel" style="display:none;">
  <button class="btn btn-xlsx-new" id="btnNew" onclick="exportXLSX('new')" style="display:none;">⬇️ New — Excel</button>
  <button class="btn btn-xlsx-vg"  id="btnVG"  onclick="exportXLSX('vg')"  style="display:none;">⬇️ Very Good — Excel</button>
  <button class="btn btn-xlsx-all" id="btnAll" onclick="exportXLSX('all')" style="display:none;">⬇️ Tümü — Excel</button>
  <button class="btn btn-isbn" onclick="copyISBN('all')">📋 Tüm ISBN Kopyala</button>
  <button class="btn btn-isbn" id="btnISBNNew" onclick="copyISBN('new')" style="display:none;">📋 New ISBN</button>
  <button class="btn btn-isbn" id="btnISBNVG"  onclick="copyISBN('vg')"  style="display:none;">📋 Very Good ISBN</button>
</div>

<div class="panel" id="tablePanel" style="display:none; padding:0; overflow:hidden;">
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>#</th><th>Başlık</th><th>ISBN</th><th>Fiyat</th><th>Kondisyon</th><th>Tarih</th><th>Link</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>
  </div>
</div>

<script>
let allBooks = [];
let selectedCond = 'vg';
let fetching = false;
let shouldStop = false;

function selectCond(c) {
  selectedCond = c;
  document.querySelectorAll('.cond-tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + c).classList.add('active');
}

function isNew(c) { return (c||'').toLowerCase().includes('new'); }
function isVG(c)  { return (c||'').toLowerCase().includes('very good') || (c||'').toLowerCase().includes('good'); }

function filterBooks(type) {
  if (type === 'new') return allBooks.filter(b => isNew(b.condition));
  if (type === 'vg')  return allBooks.filter(b => isVG(b.condition) && !isNew(b.condition));
  return allBooks;
}

function setProgress(text, pct) {
  document.getElementById('progressPanel').style.display = 'block';
  document.getElementById('progressLabel').textContent = text;
  document.getElementById('progressFill').style.width = Math.min(pct, 100) + '%';
}

function showError(msg) {
  const b = document.getElementById('errorBox');
  b.textContent = '⚠️ ' + msg;
  b.style.display = 'block';
}
function hideError() { document.getElementById('errorBox').style.display = 'none'; }
function stopFetch() { shouldStop = true; }

async function startFetch() {
  if (fetching) return;
  fetching = true;
  shouldStop = false;
  allBooks = [];
  hideError();
  ['statsPanel','actionsPanel','tablePanel'].forEach(id => document.getElementById(id).style.display = 'none');
  document.getElementById('tableBody').innerHTML = '';
  document.getElementById('fetchBtn').disabled = true;
  document.getElementById('stopBtn').style.display = '';

  const target = parseInt(document.getElementById('totalCount').value);
  const sort   = document.getElementById('sortOrder').value;
  const pageSize = 200;
  let offset = 0;
  let totalAvail = Infinity;

  try {
    while (allBooks.length < target && offset < totalAvail && !shouldStop) {
      const pct = totalAvail === Infinity ? 10 : Math.min((allBooks.length / target) * 100, 95);
      setProgress(`${allBooks.length.toLocaleString()} / ${target.toLocaleString()} kitap çekiliyor...`, pct);

      const res  = await fetch(`/api/fetch?offset=${offset}&sort=${sort}&cond=${selectedCond}`);
      const data = await res.json();

      if (!data.success) { showError(data.error || 'Bilinmeyen hata'); break; }
      if (!data.items || !data.items.length) break;

      totalAvail = data.total || Infinity;
      allBooks.push(...data.items);
      offset += pageSize;

      await new Promise(r => setTimeout(r, 200));
    }

    allBooks = allBooks.slice(0, target);
    renderStats();
    renderTable();
    renderActions();
    document.getElementById('progressPanel').style.display = 'none';
    ['statsPanel','actionsPanel','tablePanel'].forEach(id => document.getElementById(id).style.display = '');
  } catch(e) {
    showError('Bağlantı hatası: ' + e.message);
    document.getElementById('progressPanel').style.display = 'none';
  }

  fetching = false;
  document.getElementById('fetchBtn').disabled = false;
  document.getElementById('stopBtn').style.display = 'none';
}

function renderStats() {
  const newB = filterBooks('new');
  const vgB  = filterBooks('vg');
  const avg  = allBooks.length ? (allBooks.reduce((s,b)=>s+b.price,0)/allBooks.length).toFixed(2) : 0;
  document.getElementById('sTot').textContent  = allBooks.length.toLocaleString();
  document.getElementById('sISBN').textContent = allBooks.filter(b=>b.isbn).length.toLocaleString();
  document.getElementById('sNew').textContent  = newB.length.toLocaleString();
  document.getElementById('sVG').textContent   = vgB.length.toLocaleString();
  document.getElementById('sAvg').textContent  = '$' + avg;
}

function renderActions() {
  const hasNew  = filterBooks('new').length > 0;
  const hasVG   = filterBooks('vg').length  > 0;
  document.getElementById('btnNew').style.display     = hasNew ? '' : 'none';
  document.getElementById('btnVG').style.display      = hasVG  ? '' : 'none';
  document.getElementById('btnAll').style.display     = (hasNew && hasVG) ? '' : 'none';
  document.getElementById('btnISBNNew').style.display = hasNew ? '' : 'none';
  document.getElementById('btnISBNVG').style.display  = hasVG  ? '' : 'none';
}

function renderTable() {
  const tbody = document.getElementById('tableBody');
  tbody.innerHTML = '';
  if (!allBooks.length) {
    tbody.innerHTML = '<tr><td colspan="7" class="empty">Kitap bulunamadı</td></tr>';
    return;
  }
  allBooks.forEach((b, i) => {
    const newItem = isNew(b.condition);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td style="color:#444;font-size:11px;">${i+1}</td>
      <td style="max-width:260px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-size:12px;" title="${(b.title||'').replace(/"/g,'&quot;')}">${b.title||''}</td>
      <td class="isbn">${b.isbn || '<span style="color:#333">—</span>'}</td>
      <td class="price">$${(b.price||0).toFixed(2)}</td>
      <td><span class="badge ${newItem?'badge-new':'badge-vg'}">${b.condition||'-'}</span></td>
      <td style="font-size:11px;color:#666;">${b.date||''}</td>
      <td><a class="link-out" href="${b.url||'#'}" target="_blank">↗ eBay</a></td>
    `;
    tbody.appendChild(tr);
  });
}

function exportXLSX(type) {
  const books = filterBooks(type);
  if (!books.length) return;
  const label = type==='new'?'New':type==='vg'?'VeryGood':'Tumu';
  const wb = XLSX.utils.book_new();
  const mkSheet = rows => {
    const data = [['#','Başlık','ISBN','Fiyat ($)','Kondisyon','Eklenme Tarihi','eBay Linki']];
    rows.forEach((b,i) => data.push([i+1,b.title,b.isbn||'',b.price,b.condition,b.date,b.url]));
    const ws = XLSX.utils.aoa_to_sheet(data);
    ws['!cols'] = [{wch:5},{wch:52},{wch:14},{wch:10},{wch:14},{wch:14},{wch:55}];
    return ws;
  };
  XLSX.utils.book_append_sheet(wb, mkSheet(books), label==='Tumu'?'Tümü':label);
  if (type==='all') {
    XLSX.utils.book_append_sheet(wb, mkSheet(filterBooks('new')), 'New');
    XLSX.utils.book_append_sheet(wb, mkSheet(filterBooks('vg')), 'Very Good');
  }
  const s2 = XLSX.utils.aoa_to_sheet([
    ['Rapor Tarihi', new Date().toLocaleDateString('tr-TR')],
    ['Toplam', books.length],
    ["ISBN'li", books.filter(b=>b.isbn).length],
    ['New', filterBooks('new').length],
    ['Very Good', filterBooks('vg').length],
    ['Ort. Fiyat ($)', +(books.reduce((s,b)=>s+b.price,0)/books.length).toFixed(2)],
  ]);
  s2['!cols'] = [{wch:22},{wch:16}];
  XLSX.utils.book_append_sheet(wb, s2, 'Özet');
  XLSX.writeFile(wb, `booksrun_${label}_${new Date().toISOString().split('T')[0]}.xlsx`);
}

function copyISBN(type) {
  const books = filterBooks(type);
  const isbns = books.filter(b=>b.isbn).map(b=>b.isbn).join('\n');
  navigator.clipboard.writeText(isbns).then(() => alert(`✅ ${books.filter(b=>b.isbn).length} ISBN kopyalandı!`));
}
</script>
</body>
</html>
